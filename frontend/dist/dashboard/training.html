<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 — Live Training</title>
    <link rel="stylesheet" href="/nav.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background: #faf8ef;
            padding: 30px;
            padding-top: 78px;
            color: #776e65;
        }

        h1 { font-size: 36px; margin-bottom: 20px; }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .subtitle a { color: #8f7a66; }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .status-bar select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 2px solid #bbada0;
            font-size: 14px;
            font-family: inherit;
            background: #fff;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-indicator.active { background: #6ab04c; }
        .status-indicator.complete { background: #bbada0; }

        .config-bar {
            background: #bbada0;
            color: #f9f6f2;
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
            font-size: 13px;
        }

        .config-bar .item { display: flex; gap: 6px; }
        .config-bar .label { opacity: 0.8; }
        .config-bar .value { font-weight: bold; }

        .progress-bar {
            background: #d9cec5;
            border-radius: 6px;
            height: 24px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: #8f7a66;
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f9f6f2;
            font-size: 12px;
            font-weight: bold;
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: #8f7a66;
            color: #f9f6f2;
            border-radius: 6px;
            padding: 12px 20px;
            text-align: center;
        }

        .stat .label {
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .stat .value {
            font-size: 20px;
            font-weight: bold;
        }

        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-container {
            background: #fff;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        @media (max-width: 768px) {
            .charts { grid-template-columns: 1fr; }
            .stats { flex-direction: column; align-items: stretch; }
            .config-bar { flex-wrap: wrap; }
        }

        .chart-container h2 {
            font-size: 16px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <a href="/" class="nav-brand">2048</a>
        <a href="/">Game</a>
        <a href="/dashboard.html">Results</a>
        <a href="/dashboard/training.html" class="active">Training</a>
    </nav>

    <h1>Live Training</h1>

    <div class="status-bar">
        <div id="status-text">
            <span id="status-dot" class="status-indicator active"></span>
            <span id="status-label">Loading...</span>
        </div>
        <div>
            Refresh:
            <select id="refresh-interval">
                <option value="1000" selected>1s</option>
                <option value="5000">5s</option>
                <option value="10000">10s</option>
                <option value="30000">30s</option>
            </select>
        </div>
        <div>
            Last update: <strong id="last-update">—</strong>
        </div>
    </div>

    <div id="no-training" style="display:none; text-align:center; padding:80px 20px;">
        <p style="font-size:24px; font-weight:bold; margin-bottom:10px;">No training in progress</p>
        <p style="font-size:14px;">Start a training run and this page will update automatically.</p>
        <p style="font-size:13px; margin-top:8px; color:#bbada0;">
            <a href="/dashboard.html" style="color:#8f7a66;">View model results</a>
        </p>
    </div>

    <div id="training-content" style="display:none">
        <div id="config-bar" class="config-bar" style="display:none"></div>
        <div id="progress" class="progress-bar" style="display:none">
            <div id="progress-fill" class="progress-fill">0%</div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="charts">
            <div class="chart-container">
                <h2>Average Score</h2>
                <canvas id="score-chart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Tile Reach Rate (%)</h2>
                <canvas id="tile-chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let scoreChart = null;
        let tileChart = null;
        let refreshTimer = null;
        let trainingComplete = false;

        function createScoreChart(data) {
            const ctx = document.getElementById('score-chart').getContext('2d');
            const config = {
                type: 'line',
                data: {
                    labels: data.map(d => d.games_trained.toLocaleString()),
                    datasets: [{
                        label: 'Avg Score',
                        data: data.map(d => d.avg_score),
                        borderColor: '#8f7a66',
                        backgroundColor: 'rgba(143,122,102,0.1)',
                        fill: true,
                        tension: 0.3,
                    }, {
                        label: 'Max Score',
                        data: data.map(d => d.max_score),
                        borderColor: '#edc22e',
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.3,
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { title: { display: true, text: 'Games Trained' } },
                        y: { title: { display: true, text: 'Score' }, beginAtZero: true }
                    }
                }
            };

            if (scoreChart) {
                scoreChart.data = config.data;
                scoreChart.update();
            } else {
                scoreChart = new Chart(ctx, config);
            }
        }

        function createTileChart(data) {
            const ctx = document.getElementById('tile-chart').getContext('2d');
            const config = {
                type: 'line',
                data: {
                    labels: data.map(d => d.games_trained.toLocaleString()),
                    datasets: [
                        { label: '2048', data: data.map(d => d.tile_2048_pct), borderColor: '#edc22e', tension: 0.3 },
                        { label: '4096', data: data.map(d => d.tile_4096_pct), borderColor: '#f67c5f', tension: 0.3 },
                        { label: '8192', data: data.map(d => d.tile_8192_pct), borderColor: '#f65e3b', tension: 0.3 },
                        { label: '16384', data: data.map(d => d.tile_16384_pct), borderColor: '#edcf72', tension: 0.3 },
                        { label: '32768', data: data.map(d => d.tile_32768_pct), borderColor: '#bbada0', tension: 0.3 },
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { title: { display: true, text: 'Games Trained' } },
                        y: { title: { display: true, text: '%' }, beginAtZero: true, max: 100 }
                    }
                }
            };

            if (tileChart) {
                tileChart.data = config.data;
                tileChart.update();
            } else {
                tileChart = new Chart(ctx, config);
            }
        }

        function updateStats(data) {
            const container = document.getElementById('stats');
            if (data.length === 0) {
                container.innerHTML = '';
                return;
            }
            const latest = data[data.length - 1];
            container.innerHTML = `
                <div class="stat"><div class="label">Games Trained</div><div class="value">${latest.games_trained.toLocaleString()}</div></div>
                <div class="stat"><div class="label">Avg Score</div><div class="value">${Math.round(latest.avg_score).toLocaleString()}</div></div>
                <div class="stat"><div class="label">Max Score</div><div class="value">${latest.max_score.toLocaleString()}</div></div>
                <div class="stat"><div class="label">2048 Rate</div><div class="value">${latest.tile_2048_pct.toFixed(1)}%</div></div>
                <div class="stat"><div class="label">4096 Rate</div><div class="value">${latest.tile_4096_pct.toFixed(1)}%</div></div>
            `;
        }

        function updateConfig(config) {
            const bar = document.getElementById('config-bar');
            bar.style.display = 'flex';
            bar.innerHTML = `
                <div class="item"><span class="label">Model:</span><span class="value">${config.model_name}</span></div>
                <div class="item"><span class="label">Type:</span><span class="value">${config.model_type}</span></div>
                <div class="item"><span class="label">Total Games:</span><span class="value">${config.total_games.toLocaleString()}</span></div>
                <div class="item"><span class="label">LR:</span><span class="value">${config.learning_rate}</span></div>
                <div class="item"><span class="label">Patterns:</span><span class="value">${config.num_total_patterns}</span></div>
            `;
        }

        function updateProgress(data, totalGames) {
            if (!totalGames || data.length === 0) return;
            const latest = data[data.length - 1];
            const pct = Math.min(100, (latest.games_trained / totalGames) * 100);

            const bar = document.getElementById('progress');
            bar.style.display = 'block';
            const fill = document.getElementById('progress-fill');
            fill.style.width = pct + '%';
            fill.textContent = pct.toFixed(1) + '%';

            if (latest.games_trained >= totalGames) {
                trainingComplete = true;
                document.getElementById('status-dot').className = 'status-indicator complete';
                document.getElementById('status-label').textContent = 'Training complete';
                if (refreshTimer) {
                    clearInterval(refreshTimer);
                    refreshTimer = null;
                }
            } else {
                document.getElementById('status-dot').className = 'status-indicator active';
                document.getElementById('status-label').textContent = 'Training in progress';
            }
        }

        let totalGames = null;

        async function refresh() {
            try {
                // Load config if we haven't yet
                if (!totalGames) {
                    const configResp = await fetch('/training_config.json');
                    if (configResp.ok) {
                        const config = await configResp.json();
                        totalGames = config.total_games;
                        updateConfig(config);
                    }
                }

                const response = await fetch('/training_log.jsonl');
                if (!response.ok || !totalGames) {
                    document.getElementById('no-training').style.display = 'block';
                    document.getElementById('training-content').style.display = 'none';
                    document.getElementById('status-dot').className = 'status-indicator complete';
                    document.getElementById('status-label').textContent = 'No training in progress';
                    return;
                }
                const text = await response.text();
                const data = text.trim().split('\n')
                    .filter(line => line.length > 0)
                    .map(line => JSON.parse(line));

                if (data.length === 0) {
                    document.getElementById('no-training').style.display = 'block';
                    document.getElementById('training-content').style.display = 'none';
                    document.getElementById('status-dot').className = 'status-indicator active';
                    document.getElementById('status-label').textContent = 'Waiting for first eval...';
                    return;
                }

                document.getElementById('no-training').style.display = 'none';
                document.getElementById('training-content').style.display = 'block';

                createScoreChart(data);
                createTileChart(data);
                updateStats(data);
                updateProgress(data, totalGames);
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch (err) {
                console.error('Failed to fetch training log:', err);
            }
        }

        function startRefreshLoop() {
            if (trainingComplete) return;
            if (refreshTimer) clearInterval(refreshTimer);
            const interval = parseInt(document.getElementById('refresh-interval').value);
            refreshTimer = setInterval(refresh, interval);
        }

        document.getElementById('refresh-interval').addEventListener('change', startRefreshLoop);

        refresh();
        startRefreshLoop();
    </script>
</body>
</html>
