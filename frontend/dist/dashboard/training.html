<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 — Live Training</title>
    <link rel="stylesheet" href="/nav.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background: #faf8ef;
            padding: 30px;
            padding-top: 78px;
            color: #776e65;
        }

        h1 { font-size: 36px; margin-bottom: 20px; }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .subtitle a { color: #8f7a66; }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-indicator.active { background: #6ab04c; }
        .status-indicator.complete { background: #bbada0; }
        .status-indicator.connecting { background: #edc22e; }

        .config-bar {
            background: #bbada0;
            color: #f9f6f2;
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
            font-size: 13px;
        }

        .config-bar .item { display: flex; gap: 6px; }
        .config-bar .label { opacity: 0.8; }
        .config-bar .value { font-weight: bold; }

        .progress-bar {
            background: #d9cec5;
            border-radius: 6px;
            height: 24px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: #8f7a66;
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f9f6f2;
            font-size: 12px;
            font-weight: bold;
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: #8f7a66;
            color: #f9f6f2;
            border-radius: 6px;
            padding: 12px 20px;
            text-align: center;
        }

        .stat .label {
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .stat .value {
            font-size: 20px;
            font-weight: bold;
        }

        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-container {
            background: #fff;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: relative;
            min-width: 0;
        }

        .chart-container:fullscreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
        }

        .chart-container:fullscreen canvas {
            max-height: 80vh;
        }

        .fullscreen-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: 1px solid #bbada0;
            border-radius: 4px;
            color: #8f7a66;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 12px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .fullscreen-btn:hover { opacity: 1; }

        @media (max-width: 768px) {
            .charts { grid-template-columns: 1fr; }
            .stats { flex-direction: column; align-items: stretch; }
            .config-bar { flex-wrap: wrap; }
        }

        .chart-container h2 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .queue-panel {
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 16px 20px;
            margin-bottom: 20px;
        }

        .queue-panel h2 {
            font-size: 16px;
            margin: 0 0 8px 0;
        }

        .queue-empty {
            font-size: 14px;
            color: #bbada0;
            font-style: italic;
        }

        .queue-summary {
            font-size: 13px;
            color: #776e65;
        }

        .queue-summary .pill {
            display: inline-block;
            background: #faf5eb;
            border-radius: 999px;
            padding: 2px 10px;
            margin-right: 6px;
            font-variant-numeric: tabular-nums;
        }

        .queue-summary .pill.pending { background: #ede2d3; color: #8f7a66; }
        .queue-summary .pill.running { background: #f9e7c2; color: #b07a2c; }
        .queue-summary .pill.completed { background: #d8eedd; color: #3d7a52; }
        .queue-summary .pill.failed { background: #f5d4cd; color: #b04a35; }
        .queue-summary .pill.cancelled { background: #e8e2dc; color: #776e65; }

        details.queue-section {
            margin-top: 10px;
        }

        details.queue-section > summary {
            cursor: pointer;
            font-size: 13px;
            color: #8f7a66;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: bold;
            user-select: none;
            padding: 4px 0;
        }

        details.queue-section > summary:hover {
            color: #776e65;
        }

        .queue-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 6px;
        }

        .queue-table th, .queue-table td {
            text-align: left;
            padding: 6px 10px;
            border-bottom: 1px solid #f0e9dc;
            font-variant-numeric: tabular-nums;
        }

        .queue-table th {
            font-size: 10px;
            text-transform: uppercase;
            color: #8f7a66;
            letter-spacing: 0.05em;
        }

        .queue-table td.id {
            font-family: 'Menlo', 'Consolas', monospace;
            color: #9f8b77;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div id="site-nav-root"></div>
    <script src="/nav.js"></script>

    <h1>Live Training</h1>

    <div id="queue-panel" class="queue-panel">
        <h2>Job Queue</h2>
        <div id="queue-body" class="queue-empty">Connecting…</div>
    </div>

    <div class="status-bar">
        <div id="status-text">
            <span id="status-dot" class="status-indicator connecting"></span>
            <span id="status-label">Connecting...</span>
        </div>
    </div>

    <div id="no-training" style="display:none; text-align:center; padding:80px 20px;">
        <p style="font-size:24px; font-weight:bold; margin-bottom:10px;">No training in progress</p>
        <p style="font-size:14px;">Start a training run and this page will update automatically.</p>
        <p style="font-size:13px; margin-top:8px; color:#bbada0;">
            <a href="/dashboard.html" style="color:#8f7a66;">View model results</a>
        </p>
    </div>

    <div id="training-content" style="display:none">
        <div id="config-bar" class="config-bar" style="display:none"></div>
        <div id="progress" class="progress-bar" style="display:none">
            <div id="progress-fill" class="progress-fill">0%</div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="charts">
            <div class="chart-container">
                <button class="fullscreen-btn" onclick="toggleFullscreen(this.parentElement)">Expand</button>
                <h2>Average Score</h2>
                <canvas id="score-chart"></canvas>
            </div>
            <div class="chart-container">
                <button class="fullscreen-btn" onclick="toggleFullscreen(this.parentElement)">Expand</button>
                <h2>Tile Reach Rate (%)</h2>
                <canvas id="tile-chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let scoreChart = null;
        let tileChart = null;
        let totalGames = null;
        let evalData = [];

        // ---------------- Job queue panel ----------------

        const QUEUE_SECTIONS = [
            { key: 'pending',   label: 'Pending' },
            { key: 'running',   label: 'Running' },
            { key: 'failed',    label: 'Failed' },
            { key: 'cancelled', label: 'Cancelled' },
            { key: 'completed', label: 'Completed' },
        ];

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (ch) => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;',
                '"': '&quot;', "'": '&#39;',
            })[ch]);
        }

        function formatTimestamp(unixSecs) {
            return new Date(unixSecs * 1000).toLocaleString();
        }

        function renderQueueSummary(snapshot) {
            const counts = QUEUE_SECTIONS.map((section) => {
                const count = snapshot[section.key].length;
                if (count === 0) return null;
                return `<span class="pill ${section.key}">${section.label}: ${count}</span>`;
            }).filter(Boolean);
            return counts.length === 0
                ? '<div class="queue-empty">No queued jobs.</div>'
                : `<div class="queue-summary">${counts.join('')}</div>`;
        }

        function renderJobsTable(jobs) {
            const rows = jobs.map((job) => `
                <tr>
                    <td class="id">${escapeHtml(job.id)}</td>
                    <td>${escapeHtml(job.args.model_name)}</td>
                    <td>${job.args.games.toLocaleString()}</td>
                    <td>${escapeHtml(job.args.algorithm)}/${job.args.threads}t</td>
                    <td>${escapeHtml(job.args.patterns)}</td>
                    <td>${escapeHtml(job.submitted_by)}</td>
                    <td>${escapeHtml(formatTimestamp(job.submitted_at_unix))}</td>
                </tr>
            `).join('');
            return `
                <table class="queue-table">
                    <thead>
                        <tr>
                            <th>Job ID</th>
                            <th>Model</th>
                            <th>Games</th>
                            <th>Algo</th>
                            <th>Patterns</th>
                            <th>By</th>
                            <th>Submitted</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function renderQueue(snapshot) {
            const body = document.getElementById('queue-body');
            body.className = '';

            // Pending is open by default if non-empty (the actionable list).
            // Other sections are collapsed.
            const sections = QUEUE_SECTIONS.map((section) => {
                const jobs = snapshot[section.key];
                if (jobs.length === 0) return '';
                const isOpen = section.key === 'pending' || section.key === 'running';
                return `
                    <details class="queue-section" ${isOpen ? 'open' : ''}>
                        <summary>${section.label} (${jobs.length})</summary>
                        ${renderJobsTable(jobs)}
                    </details>
                `;
            }).join('');

            body.innerHTML = renderQueueSummary(snapshot) + sections;
        }

        function connectQueueStream() {
            const source = new EventSource('/queue/stream');
            source.addEventListener('snapshot', (event) => {
                try {
                    renderQueue(JSON.parse(event.data));
                } catch (err) {
                    console.error('Bad queue snapshot payload:', err);
                }
            });
            source.addEventListener('error', () => {
                const body = document.getElementById('queue-body');
                body.className = 'queue-empty';
                body.textContent = 'Queue stream disconnected, retrying…';
            });
        }

        connectQueueStream();

        // ---------------- Live training view ----------------

        function createOrUpdateScoreChart() {
            const ctx = document.getElementById('score-chart').getContext('2d');
            const chartData = {
                labels: evalData.map(d => d.games_trained.toLocaleString()),
                datasets: [{
                    label: 'Avg Score',
                    data: evalData.map(d => d.avg_score),
                    borderColor: '#8f7a66',
                    backgroundColor: 'rgba(143,122,102,0.1)',
                    fill: true,
                    tension: 0.3,
                }, {
                    label: 'Max Score',
                    data: evalData.map(d => d.max_score),
                    borderColor: '#edc22e',
                    borderDash: [5, 5],
                    fill: false,
                    tension: 0.3,
                }]
            };

            if (scoreChart) {
                scoreChart.data = chartData;
                scoreChart.update();
            } else {
                scoreChart = new Chart(ctx, {
                    type: 'line',
                    data: chartData,
                    options: {
                        responsive: true,
                        scales: {
                            x: { title: { display: true, text: 'Games Trained' } },
                            y: { title: { display: true, text: 'Score' }, beginAtZero: true }
                        }
                    }
                });
            }
        }

        function createOrUpdateTileChart() {
            const ctx = document.getElementById('tile-chart').getContext('2d');
            const chartData = {
                labels: evalData.map(d => d.games_trained.toLocaleString()),
                datasets: [
                    { label: '2048', data: evalData.map(d => d.tile_2048_pct), borderColor: '#edc22e', tension: 0.3 },
                    { label: '4096', data: evalData.map(d => d.tile_4096_pct), borderColor: '#f67c5f', tension: 0.3 },
                    { label: '8192', data: evalData.map(d => d.tile_8192_pct), borderColor: '#f65e3b', tension: 0.3 },
                    { label: '16384', data: evalData.map(d => d.tile_16384_pct), borderColor: '#edcf72', tension: 0.3 },
                    { label: '32768', data: evalData.map(d => d.tile_32768_pct), borderColor: '#bbada0', tension: 0.3 },
                ]
            };

            if (tileChart) {
                tileChart.data = chartData;
                tileChart.update();
            } else {
                tileChart = new Chart(ctx, {
                    type: 'line',
                    data: chartData,
                    options: {
                        responsive: true,
                        scales: {
                            x: { title: { display: true, text: 'Games Trained' } },
                            y: { title: { display: true, text: '%' }, beginAtZero: true, max: 100 }
                        }
                    }
                });
            }
        }

        function updateStats() {
            const container = document.getElementById('stats');
            if (evalData.length === 0) {
                container.innerHTML = '';
                return;
            }
            const latest = evalData[evalData.length - 1];
            container.innerHTML = `
                <div class="stat"><div class="label">Games Trained</div><div class="value">${latest.games_trained.toLocaleString()}</div></div>
                <div class="stat"><div class="label">Avg Score</div><div class="value">${Math.round(latest.avg_score).toLocaleString()}</div></div>
                <div class="stat"><div class="label">Max Score</div><div class="value">${latest.max_score.toLocaleString()}</div></div>
                <div class="stat"><div class="label">2048 Rate</div><div class="value">${latest.tile_2048_pct.toFixed(1)}%</div></div>
                <div class="stat"><div class="label">4096 Rate</div><div class="value">${latest.tile_4096_pct.toFixed(1)}%</div></div>
                <div class="stat"><div class="label">8192 Rate</div><div class="value">${latest.tile_8192_pct.toFixed(1)}%</div></div>
                <div class="stat"><div class="label">16384 Rate</div><div class="value">${latest.tile_16384_pct.toFixed(1)}%</div></div>
                <div class="stat"><div class="label">32768 Rate</div><div class="value">${latest.tile_32768_pct.toFixed(1)}%</div></div>
            `;
        }

        function updateConfig(config) {
            const bar = document.getElementById('config-bar');
            bar.style.display = 'flex';
            bar.innerHTML = `
                <div class="item"><span class="label">Model:</span><span class="value">${config.model_name}</span></div>
                <div class="item"><span class="label">Type:</span><span class="value">${config.model_type}</span></div>
                <div class="item"><span class="label">Total Games:</span><span class="value">${config.total_games.toLocaleString()}</span></div>
                <div class="item"><span class="label">LR:</span><span class="value">${config.learning_rate}</span></div>
                <div class="item"><span class="label">Patterns:</span><span class="value">${config.num_total_patterns}</span></div>
            `;
        }

        function updateProgress() {
            if (!totalGames || evalData.length === 0) return;
            const latest = evalData[evalData.length - 1];
            const pct = Math.min(100, (latest.games_trained / totalGames) * 100);

            const bar = document.getElementById('progress');
            bar.style.display = 'block';
            const fill = document.getElementById('progress-fill');
            fill.style.width = pct + '%';
            fill.textContent = pct.toFixed(1) + '%';

            if (latest.games_trained >= totalGames) {
                document.getElementById('status-dot').className = 'status-indicator complete';
                document.getElementById('status-label').textContent = 'Training complete';
            } else {
                document.getElementById('status-dot').className = 'status-indicator active';
                document.getElementById('status-label').textContent = 'Training in progress';
            }
        }

        function connectStream() {
            const source = new EventSource('/training/stream');

            source.addEventListener('config', (event) => {
                const config = JSON.parse(event.data);
                totalGames = config.total_games;
                updateConfig(config);
            });

            source.addEventListener('eval', (event) => {
                const entry = JSON.parse(event.data);
                evalData.push(entry);

                document.getElementById('no-training').style.display = 'none';
                document.getElementById('training-content').style.display = 'block';

                createOrUpdateScoreChart();
                createOrUpdateTileChart();
                updateStats();
                updateProgress();
            });

            source.addEventListener('no-training', () => {
                document.getElementById('no-training').style.display = 'block';
                document.getElementById('training-content').style.display = 'none';
                document.getElementById('status-dot').className = 'status-indicator complete';
                document.getElementById('status-label').textContent = 'No training data found';
            });

            source.addEventListener('open', () => {
                document.getElementById('status-dot').className = 'status-indicator active';
                document.getElementById('status-label').textContent = 'Connected';
            });

            source.addEventListener('error', () => {
                // Don't show "Reconnecting..." if training already completed —
                // the server closes the SSE stream when the log is fully sent,
                // which triggers a browser reconnect. Showing amber during that
                // brief reconnect is misleading.
                const statusDot = document.getElementById('status-dot');
                if (statusDot.className.includes('complete')) return;
                statusDot.className = 'status-indicator connecting';
                document.getElementById('status-label').textContent = 'Reconnecting...';
            });
        }

        function toggleFullscreen(element) {
            if (document.fullscreenElement === element) {
                document.exitFullscreen();
            } else {
                element.requestFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            document.querySelectorAll('.fullscreen-btn').forEach(btn => {
                btn.textContent = document.fullscreenElement === btn.parentElement ? 'Exit' : 'Expand';
            });
            requestAnimationFrame(() => {
                if (scoreChart) scoreChart.resize();
                if (tileChart) tileChart.resize();
            });
        });

        connectStream();
    </script>
</body>
</html>
