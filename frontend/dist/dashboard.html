<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 — Model Results</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background: #faf8ef;
            padding: 30px;
            color: #776e65;
        }

        h1 { font-size: 36px; margin-bottom: 5px; }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .subtitle a { color: #8f7a66; }

        .controls {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .controls label {
            font-weight: bold;
            font-size: 14px;
        }

        .controls select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 2px solid #bbada0;
            font-size: 14px;
            font-family: inherit;
            background: #fff;
            min-width: 200px;
        }

        .controls select[multiple] {
            height: 80px;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: #8f7a66;
            color: #f9f6f2;
            border-radius: 6px;
            padding: 12px 20px;
            text-align: center;
        }

        .stat .label {
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .stat .value {
            font-size: 20px;
            font-weight: bold;
        }

        .model-header {
            background: #bbada0;
            color: #f9f6f2;
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .model-header h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .model-header .description {
            font-size: 13px;
            opacity: 0.9;
        }

        .model-header .type-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            text-transform: uppercase;
            margin-left: 10px;
        }

        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: #fff;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .chart-container h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .no-curve {
            color: #bbada0;
            font-style: italic;
            padding: 40px;
            text-align: center;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .comparison-table th, .comparison-table td {
            padding: 10px 15px;
            text-align: right;
        }

        .comparison-table th {
            background: #bbada0;
            color: #f9f6f2;
            font-size: 12px;
            text-transform: uppercase;
        }

        .comparison-table th:first-child, .comparison-table td:first-child {
            text-align: left;
        }

        .comparison-table tr:nth-child(even) {
            background: #f5f0eb;
        }
    </style>
</head>
<body>
    <h1>Model Results</h1>
    <p class="subtitle"><a href="/dashboard/training.html">Live training dashboard</a></p>

    <div class="controls">
        <label>Compare models:</label>
        <select id="model-select" multiple></select>
    </div>

    <div id="comparison"></div>
    <div id="model-details"></div>

    <script>
        let allModels = [];

        async function load() {
            try {
                const response = await fetch('/models.json');
                if (!response.ok) {
                    document.getElementById('comparison').innerHTML =
                        '<p>No models.json found. Run generate_models first.</p>';
                    return;
                }
                const data = await response.json();
                allModels = data.models;
                populateSelect();
                renderAll();
            } catch (err) {
                console.error('Failed to load models:', err);
            }
        }

        function populateSelect() {
            const select = document.getElementById('model-select');
            select.innerHTML = '';
            allModels.forEach((model, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = model.model_name;
                option.selected = true;
                select.appendChild(option);
            });
            select.addEventListener('change', renderAll);
        }

        function selectedModels() {
            const select = document.getElementById('model-select');
            return Array.from(select.selectedOptions).map(opt => allModels[parseInt(opt.value)]);
        }

        function renderAll() {
            const models = selectedModels();
            renderComparisonTable(models);
            renderModelDetails(models);
        }

        function renderComparisonTable(models) {
            const container = document.getElementById('comparison');
            if (models.length === 0) {
                container.innerHTML = '<p>Select at least one model.</p>';
                return;
            }

            let html = `<table class="comparison-table">
                <tr>
                    <th>Model</th><th>Type</th><th>Avg Score</th><th>Max Score</th>
                    <th>2048%</th><th>4096%</th><th>8192%</th><th>16384%</th><th>32768%</th>
                </tr>`;

            for (const model of models) {
                const ev = model.final_eval;
                html += `<tr>
                    <td><strong>${model.model_name}</strong></td>
                    <td>${model.model_type}</td>
                    <td>${Math.round(ev.avg_score).toLocaleString()}</td>
                    <td>${ev.max_score.toLocaleString()}</td>
                    <td>${ev.tile_2048_pct.toFixed(1)}</td>
                    <td>${ev.tile_4096_pct.toFixed(1)}</td>
                    <td>${ev.tile_8192_pct.toFixed(1)}</td>
                    <td>${ev.tile_16384_pct.toFixed(1)}</td>
                    <td>${ev.tile_32768_pct.toFixed(1)}</td>
                </tr>`;
            }

            html += '</table>';
            container.innerHTML = html;
        }

        const CHART_COLORS = ['#8f7a66', '#edc22e', '#f67c5f', '#f65e3b', '#edcf72'];

        function renderModelDetails(models) {
            const container = document.getElementById('model-details');
            container.innerHTML = '';

            // If any model has a training curve, show the combined chart
            const trainedModels = models.filter(m => m.training_curve && m.training_curve.length > 0);

            if (trainedModels.length > 0) {
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="charts">
                        <div class="chart-container">
                            <h3>Training Progress — Average Score</h3>
                            <canvas id="combined-score-chart"></canvas>
                        </div>
                        <div class="chart-container">
                            <h3>Training Progress — 2048 Tile Rate</h3>
                            <canvas id="combined-tile-chart"></canvas>
                        </div>
                    </div>`;
                container.appendChild(section);

                // Score chart
                const maxLen = Math.max(...trainedModels.map(m => m.training_curve.length));
                const longestModel = trainedModels.find(m => m.training_curve.length === maxLen);
                const labels = longestModel.training_curve.map(e => e.games_trained.toLocaleString());

                new Chart(document.getElementById('combined-score-chart'), {
                    type: 'line',
                    data: {
                        labels,
                        datasets: trainedModels.map((model, i) => ({
                            label: model.model_name,
                            data: model.training_curve.map(e => e.avg_score),
                            borderColor: CHART_COLORS[i % CHART_COLORS.length],
                            fill: false,
                            tension: 0.3,
                        }))
                    },
                    options: {
                        responsive: true,
                        scales: {
                            x: { title: { display: true, text: 'Games Trained' } },
                            y: { title: { display: true, text: 'Avg Score' }, beginAtZero: true }
                        }
                    }
                });

                new Chart(document.getElementById('combined-tile-chart'), {
                    type: 'line',
                    data: {
                        labels,
                        datasets: trainedModels.map((model, i) => ({
                            label: model.model_name,
                            data: model.training_curve.map(e => e.tile_2048_pct),
                            borderColor: CHART_COLORS[i % CHART_COLORS.length],
                            fill: false,
                            tension: 0.3,
                        }))
                    },
                    options: {
                        responsive: true,
                        scales: {
                            x: { title: { display: true, text: 'Games Trained' } },
                            y: { title: { display: true, text: '2048 Reach %' }, beginAtZero: true, max: 100 }
                        }
                    }
                });
            }

            // Individual model cards
            for (const model of models) {
                const card = document.createElement('div');
                const ev = model.final_eval;
                card.innerHTML = `
                    <div class="model-header">
                        <h2>${model.model_name}<span class="type-badge">${model.model_type}</span></h2>
                        <div class="description">${model.description}</div>
                    </div>
                    <div class="stats">
                        <div class="stat"><div class="label">Avg Score</div><div class="value">${Math.round(ev.avg_score).toLocaleString()}</div></div>
                        <div class="stat"><div class="label">Max Score</div><div class="value">${ev.max_score.toLocaleString()}</div></div>
                        <div class="stat"><div class="label">2048 Rate</div><div class="value">${ev.tile_2048_pct.toFixed(1)}%</div></div>
                        <div class="stat"><div class="label">4096 Rate</div><div class="value">${ev.tile_4096_pct.toFixed(1)}%</div></div>
                        <div class="stat"><div class="label">8192 Rate</div><div class="value">${ev.tile_8192_pct.toFixed(1)}%</div></div>
                    </div>`;
                container.appendChild(card);
            }
        }

        load();
    </script>
</body>
</html>
