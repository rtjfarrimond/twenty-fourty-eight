<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 — Model Results</title>
    <link rel="stylesheet" href="/nav.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background: #faf8ef;
            padding: 30px;
            padding-top: 78px;
            color: #776e65;
        }

        h1 { font-size: 36px; margin-bottom: 20px; }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .subtitle a { color: #8f7a66; }


        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: #8f7a66;
            color: #f9f6f2;
            border-radius: 6px;
            padding: 12px 20px;
            text-align: center;
        }

        .stat .label {
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .stat .value {
            font-size: 20px;
            font-weight: bold;
        }


        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .charts { grid-template-columns: 1fr; }
        }

        .chart-container {
            background: #fff;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: relative;
            min-width: 0;
        }

        .chart-container:fullscreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
        }

        .chart-container:fullscreen canvas {
            max-height: 80vh;
        }

        .fullscreen-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: 1px solid #bbada0;
            border-radius: 4px;
            color: #8f7a66;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 12px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .fullscreen-btn:hover { opacity: 1; }

        .chart-container h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .no-curve {
            color: #bbada0;
            font-style: italic;
            padding: 40px;
            text-align: center;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 30px;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .comparison-table th, .comparison-table td {
            padding: 10px 15px;
            text-align: right;
        }

        .comparison-table th {
            background: #bbada0;
            color: #f9f6f2;
            font-size: 12px;
            text-transform: uppercase;
        }

        .comparison-table th:first-child, .comparison-table td:first-child {
            text-align: left;
        }

        .comparison-table tr:nth-child(even) {
            background: #f5f0eb;
        }

        .comparison-table th.sortable {
            cursor: pointer;
            user-select: none;
        }

        .comparison-table th.sortable:hover {
            background: #a89888;
        }

        .cell-description {
            font-size: 12px;
            font-weight: normal;
            color: #9f8b77;
            margin-top: 4px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="site-nav-root"></div>
    <script src="/nav.js"></script>

    <h1>Model Results</h1>

    <div id="results-table"></div>
    <div id="charts-section"></div>

    <script>
        let allModels = [];
        let sortColumn = 'max_score';
        let sortAsc = false;
        let activeCharts = [];

        async function load() {
            try {
                const response = await fetch('/models.json');
                if (!response.ok) {
                    document.getElementById('results-table').innerHTML =
                        '<p>No models.json found. Run generate_models first.</p>';
                    return;
                }
                const data = await response.json();
                allModels = data.models;
                renderTable();
                renderCharts(allModels);
            } catch (err) {
                console.error('Failed to load models:', err);
            }
        }

        function sortValue(model, column) {
            const ev = model.final_eval;
            switch (column) {
                case 'model_name': return model.model_name.toLowerCase();
                case 'model_type': return model.model_type.toLowerCase();
                case 'avg_score': return ev.avg_score;
                case 'max_score': return ev.max_score;
                case 'tile_2048_pct': return ev.tile_2048_pct;
                case 'tile_4096_pct': return ev.tile_4096_pct;
                case 'tile_8192_pct': return ev.tile_8192_pct;
                case 'tile_16384_pct': return ev.tile_16384_pct;
                case 'tile_32768_pct': return ev.tile_32768_pct;
                default: return 0;
            }
        }

        function handleSort(column) {
            if (sortColumn === column) {
                sortAsc = !sortAsc;
            } else {
                sortColumn = column;
                sortAsc = false;
            }
            renderTable();
        }

        function sortIndicator(column) {
            if (sortColumn !== column) return '';
            return sortAsc ? ' \u25B2' : ' \u25BC';
        }

        function renderTable() {
            const sorted = [...allModels].sort((a, b) => {
                const va = sortValue(a, sortColumn);
                const vb = sortValue(b, sortColumn);
                const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
                return sortAsc ? cmp : -cmp;
            });

            const container = document.getElementById('results-table');
            const columns = [
                ['model_name', 'Model'],
                ['model_type', 'Type'],
                ['avg_score', 'Avg Score'],
                ['max_score', 'Max Score'],
                ['tile_2048_pct', '2048%'],
                ['tile_4096_pct', '4096%'],
                ['tile_8192_pct', '8192%'],
                ['tile_16384_pct', '16384%'],
                ['tile_32768_pct', '32768%'],
            ];

            let html = '<div class="table-wrapper"><table class="comparison-table"><tr>';
            for (const [key, label] of columns) {
                html += `<th class="sortable" onclick="handleSort('${key}')">${label}${sortIndicator(key)}</th>`;
            }
            html += '</tr>';

            for (const model of sorted) {
                const ev = model.final_eval;
                html += `<tr>
                    <td>
                        <strong>${model.model_name}</strong>
                        <div class="cell-description">${model.description}</div>
                    </td>
                    <td>${model.model_type}</td>
                    <td>${Math.round(ev.avg_score).toLocaleString()}</td>
                    <td>${ev.max_score.toLocaleString()}</td>
                    <td>${ev.tile_2048_pct.toFixed(1)}</td>
                    <td>${ev.tile_4096_pct.toFixed(1)}</td>
                    <td>${ev.tile_8192_pct.toFixed(1)}</td>
                    <td>${ev.tile_16384_pct.toFixed(1)}</td>
                    <td>${ev.tile_32768_pct.toFixed(1)}</td>
                </tr>`;
            }

            html += '</table></div>';
            container.innerHTML = html;
        }

        const CHART_COLORS = ['#8f7a66', '#edc22e', '#f67c5f', '#f65e3b', '#edcf72'];

        function renderCharts(models) {
            const container = document.getElementById('charts-section');
            container.innerHTML = '';
            activeCharts.forEach(c => c.destroy());
            activeCharts = [];

            const trainedModels = models.filter(m => m.training_curve && m.training_curve.length > 0);
            if (trainedModels.length === 0) return;

            container.innerHTML = `
                <div class="charts">
                    <div class="chart-container">
                        <button class="fullscreen-btn" onclick="toggleFullscreen(this.parentElement)">Expand</button>
                        <h3>Training Progress — Average Score</h3>
                        <canvas id="combined-score-chart"></canvas>
                    </div>
                    <div class="chart-container">
                        <button class="fullscreen-btn" onclick="toggleFullscreen(this.parentElement)">Expand</button>
                        <h3>Training Progress — 2048 Tile Rate</h3>
                        <canvas id="combined-tile-chart"></canvas>
                    </div>
                </div>`;

            const linearXAxis = {
                type: 'linear',
                title: { display: true, text: 'Games Trained' },
                ticks: {
                    callback: (value) => Number(value).toLocaleString(),
                },
            };

            const scoreChart = new Chart(document.getElementById('combined-score-chart'), {
                type: 'line',
                data: {
                    datasets: trainedModels.map((model, i) => ({
                        label: model.model_name,
                        data: model.training_curve.map(e => ({ x: e.games_trained, y: e.avg_score })),
                        borderColor: CHART_COLORS[i % CHART_COLORS.length],
                        fill: false,
                        tension: 0.3,
                    }))
                },
                options: {
                    responsive: true,
                    parsing: false,
                    scales: {
                        x: linearXAxis,
                        y: { title: { display: true, text: 'Avg Score' }, beginAtZero: true }
                    }
                }
            });

            const tileChart = new Chart(document.getElementById('combined-tile-chart'), {
                type: 'line',
                data: {
                    datasets: trainedModels.map((model, i) => ({
                        label: model.model_name,
                        data: model.training_curve.map(e => ({ x: e.games_trained, y: e.tile_2048_pct })),
                        borderColor: CHART_COLORS[i % CHART_COLORS.length],
                        fill: false,
                        tension: 0.3,
                    }))
                },
                options: {
                    responsive: true,
                    parsing: false,
                    scales: {
                        x: linearXAxis,
                        y: { title: { display: true, text: '2048 Reach %' }, beginAtZero: true, max: 100 }
                    }
                }
            });

            activeCharts = [scoreChart, tileChart];
        }

        function toggleFullscreen(element) {
            if (document.fullscreenElement === element) {
                document.exitFullscreen();
            } else {
                element.requestFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            document.querySelectorAll('.fullscreen-btn').forEach(btn => {
                btn.textContent = document.fullscreenElement === btn.parentElement ? 'Exit' : 'Expand';
            });
            requestAnimationFrame(() => activeCharts.forEach(c => c.resize()));
        });

        load();
    </script>
</body>
</html>
