<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <link rel="stylesheet" href="/nav.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background: #faf8ef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }

        h1 {
            font-size: 80px;
            color: #776e65;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-container {
            background: #bbada0;
            color: #fff;
            padding: 10px 25px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
        }

        .score-container .label {
            font-size: 13px;
            text-transform: uppercase;
        }

        #score {
            font-size: 25px;
        }

        button {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #9f8b77;
        }

        .game-area {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .left-panel {
            width: 200px;
            text-align: left;
        }

        .left-panel .intro {
            color: #776e65;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .left-panel .panel-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #776e65;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #model-select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 2px solid #bbada0;
            font-size: 14px;
            font-family: inherit;
            background: #fff;
            color: #776e65;
            margin-bottom: 12px;
        }

        #model-description {
            color: #776e65;
            font-size: 13px;
            line-height: 1.5;
        }

        .board {
            position: relative;
            background: #bbada0;
            border-radius: 6px;
            padding: 12px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 12px;
        }

        .tile {
            width: 100px;
            height: 100px;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            border-radius: 6px;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            font-weight: bold;
            color: #776e65;
        }

        .last-move-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
        }

        .last-move-container .label {
            font-size: 12px;
            text-transform: uppercase;
            color: #776e65;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #last-move {
            font-size: 48px;
            line-height: 1;
            color: #f9f6f2;
            background: #8f7a66;
            border-radius: 6px;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 9px;
        }

        #play-hint {
            color: #776e65;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <a href="/" class="nav-brand">2048</a>
        <a href="/" class="active">Game</a>
        <a href="/dashboard.html">Results</a>
        <a href="/dashboard/training.html">Training</a>
    </nav>
    <div class="nav-spacer"></div>

    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="header-controls">
                <div class="score-container">
                    <div class="label">Score</div>
                    <div id="score">0</div>
                </div>
                <button id="play-btn">Play</button>
                <button id="watch-btn" style="display:none">Watch</button>
            </div>
        </div>

        <div class="game-area">
            <div class="left-panel" id="left-panel">
                <p class="intro">Watch trained reinforcement learning models play 2048 in real-time, or take over and play yourself.</p>
                <div class="panel-label">Model</div>
                <select id="model-select"></select>
                <div id="model-description"></div>
            </div>
            <div class="board">
                <div id="grid"></div>
                <div id="game-over">Game Over</div>
            </div>
            <div class="last-move-container">
                <div class="label">Last move</div>
                <div id="last-move"></div>
            </div>
        </div>

        <p id="play-hint" style="display:none">Use arrow keys to play</p>
    </div>

    <script type="module">
        import init from './pkg/frontend.js';
        init();
    </script>
</body>
</html>
